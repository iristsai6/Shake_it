<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>走跳酒Bar</title>
    <link rel="icon" href="https://fav.farm/🍸?v=4">
    <link rel="apple-touch-icon" href="https://fav.farm/🍸?v=4">
    <meta name="apple-mobile-web-app-title" content="走跳酒Bar">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        :root { --gold: #d4af37; --bg-dark: #000000; --card-bg: #1a1a1a; --inner-bg: #262626; }
        body, html { margin: 0; padding: 0; font-family: 'PingFang TC', sans-serif; background: var(--bg-dark); color: #eee; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        nav { display: flex; justify-content: center; gap: 15px; background: rgba(0,0,0,0.95); padding: 20px 0; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #222; }
        nav button { background: none; border: 1px solid #444; color: #888; padding: 8px 22px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; letter-spacing: 2px; }
        nav button.active { border-color: var(--gold); color: var(--gold); }
        .page { display: none; flex-direction: column; align-items: center; padding: 100px 20px 40px; min-height: 100vh; box-sizing: border-box; opacity: 0; transition: opacity 0.4s; }
        .page.active { display: flex; opacity: 1; }
        .luxury-outer { border: 1px solid var(--gold); padding: 12px; width: 100%; max-width: 380px; margin: 10px auto; }
        .luxury-inner { background: var(--card-bg); border-radius: 35px; padding: 25px; text-align: left; min-height: 500px; display: flex; flex-direction: column; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .tag { padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: bold; color: #000; }
        .tag-base { background: #5d9cec; } .tag-str { background: #ed5565; } .tag-flav { background: #a0d468; } .tag-meth { background: #ffce54; } .tag-glass { background: #ac92ec; }
        .recipe-title-zh { color: var(--gold); font-size: 1.8rem; margin: 0; font-weight: bold; }
        .recipe-title-en { color: #666; font-size: 0.85rem; font-style: italic; margin-bottom: 15px; }
        .ing-box { background: var(--inner-bg); border-radius: 20px; padding: 15px; margin-bottom: 10px; }
        .ing-list { list-style: none; padding: 0; margin: 0; color: #bbb; line-height: 1.6; font-size: 0.85rem; }
        .ing-list li::before { content: "• "; color: var(--gold); margin-right: 8px; }
        .tip-box { padding: 12px; border-left: 2px solid var(--gold); background: rgba(212, 175, 55, 0.05); font-size: 0.75rem; color: #999; font-style: italic; }
        .game-card { background: #1a1a1a; border: 2px solid var(--gold); padding: 40px 20px; width: 85%; max-width: 380px; border-radius: 20px; text-align: center; margin: 20px 0; font-size: 1.3rem; color: var(--gold); min-height: 120px; display: flex; align-items: center; justify-content: center; }
        .custom-input-area { width: 85%; max-width: 380px; display: none; flex-direction: column; gap: 10px; }
        .custom-input-area.show { display: flex; }
        .cmd-list-container { background: #111; border-radius: 10px; padding: 10px; max-height: 180px; overflow-y: auto; }
        .cmd-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 0.8rem; }
        .del-btn { color: #ed5565; background: none; border: none; }
        .generate-btn, .game-btn { background: var(--gold); color: #000; border: none; padding: 15px 50px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .mode-switch { display: flex; background: #222; border-radius: 50px; padding: 5px; margin-bottom: 15px; }
        .mode-btn { background: none; border: none; color: #888; padding: 8px 15px; border-radius: 50px; font-size: 0.75rem; }
        .mode-btn.active { background: var(--gold); color: #000; }
        @keyframes shake-anim { 0%, 100% {transform: translateX(0)} 20% {transform: translateX(10px)} 40% {transform: translateX(-10px)} }
        .shaking { animation: shake-anim 0.3s infinite; }
    </style>
</head>
<body>
    <nav>
        <button onclick="showPage('home-page')" id="nav-home" class="active">HOME</button>
        <button onclick="showPage('recipe-page')" id="nav-recipe">RECIPE</button>
        <button onclick="showPage('game-page')" id="nav-party">PARTY</button>
    </nav>

    <section id="home-page" class="page active">
        <h1 style="font-size: 3rem; color: var(--gold); margin-top: 10vh;">BAR 🍸</h1>
        <div style="border: 1px solid #333; padding: 30px; border-radius: 20px; text-align: center;">
            <p style="color: #666; font-size: 0.7rem;">DAILY SPECIAL</p>
            <div id="ds-zh" style="font-size: 1.5rem; color: var(--gold); font-weight: bold;">---</div>
            <p id="ds-en" style="color: #444; font-style: italic;">---</p>
        </div>
    </section>

    <section id="recipe-page" class="page">
        <div class="luxury-outer"><div id="recipe-display" class="luxury-inner"><div style="text-align:center;margin-top:180px;color:#444;">Shake to Draw</div></div></div>
        <button class="generate-btn" onclick="roll()">GENERATE</button>
    </section>

    <section id="game-page" class="page">
        <div class="mode-switch">
            <button id="m-def" class="mode-btn active" onclick="switchMode('default')">內建</button>
            <button id="m-cus" class="mode-btn" onclick="switchMode('custom')">全自訂</button>
        </div>
        <div id="game-display" class="game-card">Ready?</div>
        <button class="game-btn" onclick="rollGame()">DRAW</button>
        <div id="cus-area" class="custom-input-area">
            <input type="text" id="cus-input" style="background:#222;border:1px solid #444;color:#fff;padding:10px;border-radius:5px;" placeholder="輸入指令...">
            <button onclick="addCmd()" style="background:var(--gold);padding:8px;border-radius:5px;border:none;">新增</button>
            <div id="cmd-list" class="cmd-list-container"></div>
            <button onclick="clearAll()" style="color:#666;background:none;border:none;font-size:0.7rem;">清空所有</button>
        </div>
    </section>

    <script>
        const database = [
            // Gin
            {zh:"馬丁尼",en:"Martini",base:"琴酒",str:"強烈",flav:"辛辣",meth:"攪拌",glass:"馬丁尼杯",ing:["琴酒 60ml","苦艾酒 10ml"],tip:"雞尾酒之王，007愛喝。"},
            {zh:"尼格羅尼",en:"Negroni",base:"琴酒",str:"強烈",flav:"苦甜",meth:"攪拌",glass:"古典杯",ing:["琴酒 30ml","金巴利 30ml","紅苦艾酒 30ml"],tip:"極致的苦甜平衡。"},
            {zh:"琴蕾",en:"Gimlet",base:"琴酒",str:"中等",flav:"酸甜",meth:"搖盪",glass:"馬丁尼杯",ing:["琴酒 45ml","萊姆汁 15ml"],tip:"簡單考驗品質。"},
            {zh:"白色佳人",en:"White Lady",base:"琴酒",str:"中等",flav:"酸甜",meth:"搖盪",glass:"馬丁尼杯",ing:["琴酒 40ml","橙酒 30ml","檸檬汁"],tip:"口感絲滑優雅。"},
            {zh:"臨別一語",en:"Last Word",base:"琴酒",str:"強烈",flav:"草本",meth:"搖盪",glass:"馬丁尼杯",ing:["琴酒","綠夏翠絲","櫻桃酒","萊姆汁"],tip:"層次極其豐富。"},
            {zh:"琴費斯",en:"Gin Fizz",base:"琴酒",str:"輕微",flav:"清爽",meth:"搖盪",glass:"高球杯",ing:["琴酒 45ml","蘇打水","檸檬汁"],tip:"夏日清爽首選。"},
            // Whiskey
            {zh:"古典",en:"Old Fashioned",base:"威士忌",str:"強烈",flav:"苦甜",meth:"攪拌",glass:"古典杯",ing:["波本威士忌 45ml","方糖","苦精"],tip:"最純粹的喝法。"},
            {zh:"威士忌酸酒",en:"Whiskey Sour",base:"威士忌",str:"中等",flav:"酸甜",meth:"搖盪",glass:"古典杯",ing:["威士忌 45ml","檸檬汁","蛋白"],tip:"經典酸酒代表。"},
            {zh:"曼哈頓",en:"Manhattan",base:"威士忌",str:"強烈",flav:"濃郁",meth:"攪拌",glass:"馬丁尼杯",ing:["裸麥威士忌","紅苦艾酒"],tip:"雞尾酒之后。"},
            {zh:"盤尼西林",en:"Penicillin",base:"威士忌",str:"中等",flav:"煙燻",meth:"搖盪",glass:"古典杯",ing:["威士忌","檸檬汁","薑汁蜂蜜"],tip:"泥煤與薑的撞擊。"},
            {zh:"羅伯羅伊",en:"Rob Roy",base:"威士忌",str:"強烈",flav:"濃郁",meth:"攪拌",glass:"馬丁尼杯",ing:["蘇格蘭威士忌","紅苦艾酒"],tip:"蘇格蘭版曼哈頓。"},
            {zh:"薄荷茱莉普",en:"Mint Julep",base:"威士忌",str:"中等",flav:"清爽",meth:"直調",glass:"碎冰杯",ing:["波本威士忌","薄荷葉","糖"],tip:"賽馬會指定飲品。"},
            // Rum
            {zh:"莫希托",en:"Mojito",base:"蘭姆酒",str:"輕微",flav:"清爽",meth:"直調",glass:"高球杯",ing:["蘭姆酒","薄荷","蘇打水"],tip:"古巴的夏日風情。"},
            {zh:"黛綺莉",en:"Daiquiri",base:"蘭姆酒",str:"中等",flav:"酸甜",meth:"搖盪",glass:"馬丁尼杯",ing:["蘭姆酒 60ml","萊姆汁"],tip:"基礎卻最難做。"},
            {zh:"月黑風高",en:"Dark 'N' Stormy",base:"蘭姆酒",str:"中等",flav:"辛辣",meth:"直調",glass:"高球杯",ing:["黑蘭姆酒","薑汁啤酒"],tip:"百慕達傳奇。"},
            {zh:"邁泰",en:"Mai Tai",base:"蘭姆酒",str:"強烈",flav:"果香",meth:"搖盪",glass:"Tiki杯",ing:["黑白蘭姆酒","橙酒","杏仁"],tip:"熱帶風格王者。"},
            {zh:"自由古巴",en:"Cuba Libre",base:"蘭姆酒",str:"輕微",flav:"酸甜",meth:"直調",glass:"高球杯",ing:["蘭姆酒","可樂","萊姆"],tip:"自由的味道。"},
            {zh:"Piña Colada",en:"Piña Colada",base:"蘭姆酒",str:"輕微",flav:"甜美",meth:"搖盪",glass:"颶風杯",ing:["蘭姆酒","鳳梨汁","椰奶"],tip:"液體甜點。"},
            // Tequila
            {zh:"瑪格麗特",en:"Margarita",base:"龍舌蘭",str:"中等",flav:"酸鹹",meth:"搖盪",glass:"瑪格麗特杯",ing:["龍舌蘭","橙酒","萊姆汁","鹽"],tip:"淚水的味道。"},
            {zh:"龍舌蘭日出",en:"Sunrise",base:"龍舌蘭",str:"輕微",flav:"果香",meth:"直調",glass:"高球杯",ing:["龍舌蘭","柳橙汁","紅石榴"],tip:"絕美的漸層視覺。"},
            {zh:"帕羅瑪",en:"Paloma",base:"龍舌蘭",str:"輕微",flav:"柚香",meth:"直調",glass:"高球杯",ing:["龍舌蘭","葡萄柚蘇打"],tip:"墨西哥在地最愛。"},
            {zh:"鬥牛士",en:"Matador",base:"龍舌蘭",str:"輕微",flav:"清爽",meth:"搖盪",glass:"笛型杯",ing:["龍舌蘭","鳳梨汁","萊姆"],tip:"熱帶消暑首選。"},
            {zh:"神之使者",en:"El Diablo",base:"龍舌蘭",str:"中等",flav:"薑香",meth:"直調",glass:"高球杯",ing:["龍舌蘭","黑醋栗","薑汁啤酒"],tip:"豐富的莓果辛辣。"},
            {zh:"草帽",en:"Mexican Mule",base:"龍舌蘭",str:"輕微",flav:"薑汁",meth:"直調",glass:"銅杯",ing:["龍舌蘭","萊姆汁","薑汁啤酒"],tip:"墨西哥騾子。"},
            // Vodka
            {zh:"莫斯科騾子",en:"Moscow Mule",base:"伏特加",str:"輕微",flav:"薑汁",meth:"直調",glass:"銅杯",ing:["伏特加","萊姆汁","薑汁啤酒"],tip:"清爽的銅杯體驗。"},
            {zh:"咖啡馬丁尼",en:"Espresso Martini",base:"伏特加",str:"中等",flav:"濃郁",meth:"搖盪",glass:"馬丁尼杯",ing:["伏特加","咖啡","咖啡酒"],tip:"提神且微醺。"},
            {zh:"長島冰茶",en:"Long Island",base:"伏特加",str:"強烈",flav:"酸甜",meth:"直調",glass:"高球杯",ing:["五大基酒","可樂"],tip:"失憶水。"},
            {zh:"柯夢波丹",en:"Cosmopolitan",base:"伏特加",str:"中等",flav:"果香",meth:"搖盪",glass:"馬丁尼杯",ing:["伏特加","橙酒","蔓越莓汁"],tip:"都市女性經典。"},
            {zh:"海風",en:"Sea Breeze",base:"伏特加",str:"輕微",flav:"果香",meth:"直調",glass:"高球杯",ing:["伏特加","蔓越莓","葡萄柚"],tip:"微酸清爽。"},
            {zh:"血腥瑪麗",en:"Bloody Mary",base:"伏特加",str:"中等",flav:"鹹辣",meth:"捲動",glass:"高球杯",ing:["伏特加","番茄汁","香料"],tip:"早午餐良伴。"},
            // Brandy
            {zh:"側車",en:"Sidecar",base:"白蘭地",str:"中等",flav:"酸甜",meth:"搖盪",glass:"馬丁尼杯",ing:["白蘭地","橙酒","檸檬汁"],tip:"最經典的平衡。"},
            {zh:"亞歷山大",en:"Alexander",base:"白蘭地",str:"中等",flav:"奶香",meth:"搖盪",glass:"馬丁尼杯",ing:["白蘭地","可可酒","鮮奶油"],tip:"成人的甜點。"},
            {zh:"薩澤拉克",en:"Sazerac",base:"白蘭地",str:"強烈",flav:"草本",meth:"攪拌",glass:"古典杯",ing:["白蘭地","艾碧斯","苦精"],tip:"最古老的雞尾酒。"},
            {zh:"馬蹄",en:"Horse's Neck",base:"白蘭地",str:"輕微",flav:"清爽",meth:"直調",glass:"高球杯",ing:["白蘭地","薑汁汽水"],tip:"優雅長皮裝飾。"},
            {zh:"香榭麗舍",en:"Champs-Élysées",base:"白蘭地",str:"強烈",flav:"草本",meth:"搖盪",glass:"馬丁尼杯",ing:["白蘭地","黃夏翠絲"],tip:"巴黎的浪漫。"},
            {zh:"床第之間",en:"Between Sheets",base:"白蘭地",str:"強烈",flav:"酸甜",meth:"搖盪",glass:"馬丁尼杯",ing:["白蘭地","蘭姆酒","橙酒"],tip:"夜晚的誘惑。"}
        ];

        let customCmds = JSON.parse(localStorage.getItem('party_custom_cmds')) || [];
        let mode = 'default';

        function showPage(pId) {
            document.querySelectorAll('.page').forEach(p=>{p.classList.remove('active'); p.style.display='none';});
            const t = document.getElementById(pId); t.style.display='flex'; setTimeout(()=>t.classList.add('active'),10);
            document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
            document.getElementById('nav-'+(pId==='game-page'?'party':pId.split('-')[0])).classList.add('active');
        }

        function roll() {
            const d = document.getElementById('recipe-display'); d.classList.add('shaking');
            setTimeout(()=>{
                d.classList.remove('shaking'); const r = database[Math.floor(Math.random()*database.length)];
                d.innerHTML = `<div class="tag-container"><span class="tag tag-base">${r.base}</span><span class="tag tag-str">${r.str}</span><span class="tag tag-flav">${r.flav}</span><span class="tag tag-meth">${r.meth}</span><span class="tag tag-glass">${r.glass}</span></div><h2 class="recipe-title-zh">${r.zh}</h2><div class="recipe-title-en">${r.en}</div><div class="ing-box"><ul class="ing-list">${r.ing.map(i=>`<li>${i}</li>`).join('')}</ul></div><div class="tip-box">💡 ${r.tip}</div>`;
            },400);
        }

        function switchMode(m) {
            mode = m; document.getElementById('m-def').classList.toggle('active',m==='default'); document.getElementById('m-cus').classList.toggle('active',m==='custom');
            document.getElementById('cus-area').classList.toggle('show',m==='custom'); if(m==='custom') render();
        }

        function addCmd() {
            const i = document.getElementById('cus-input'); if(i.value.trim()){ customCmds.push(i.value); i.value=''; save(); }
        }

        function delCmd(idx) { customCmds.splice(idx,1); save(); }
        function clearAll() { if(confirm("清空？")){customCmds=[]; save();} }
        function save() { localStorage.setItem('party_custom_cmds', JSON.stringify(customCmds)); render(); }
        function render() {
            document.getElementById('cmd-list').innerHTML = customCmds.map((c,i)=>`<div class="cmd-item"><span>${c}</span><button class="del-btn" onclick="delCmd(${i})">刪除</button></div>`).join('') || '<p style="font-size:0.7rem;text-align:center;">空</p>';
        }

        function rollGame() {
            const d = document.getElementById('game-display'); let p = mode==='default' ? ["喝1杯","左右乾杯","電量低喝","不准說你我他","交杯酒","全場喝","手機末碼喝"] : customCmds;
            if(!p.length){ d.innerText="請新增指令"; return; }
            d.innerText="DRAWING..."; setTimeout(()=>{d.innerText=p[Math.floor(Math.random()*p.length)];},300);
        }

        window.onload = () => {
            const s = database[Math.floor(Math.random()*database.length)];
            document.getElementById('ds-zh').innerText=s.zh; document.getElementById('ds-en').innerText=s.en;
        };

        let lastU=0, lx, ly, lz, THRESHOLD=800;
        window.addEventListener('devicemotion', e => {
            if(document.getElementById('recipe-page').style.display!=='flex') return;
            let acc = e.accelerationIncludingGravity; let now = Date.now();
            if((now-lastU)>100){
                let diff = now-lastU; lastU=now;
                let speed = Math.abs(acc.x+acc.y+acc.z-lx-ly-lz)/diff*10000;
                if(speed>THRESHOLD) roll();
                lx=acc.x; ly=acc.y; lz=acc.z;
            }
        });
    </script>
</body>
</html>
