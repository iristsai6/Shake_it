<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>走跳酒Bar</title>
    <meta name="description" content="專屬你的微醺配方與派對遊戲">
    <meta property="og:title" content="走跳酒Bar">
    <meta property="og:description" content="隨機抽取你的靈魂配方！內含多種經典調酒酒譜與派對大冒險功能。">
    <meta property="og:image" content="https://fav.farm/🍸">

    <link rel="icon" href="https://fav.farm/🍸?v=5">
    <link rel="apple-touch-icon" href="https://fav.farm/🍸?v=5">
    <meta name="apple-mobile-web-app-title" content="走跳酒Bar">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        :root { --gold: #d4af37; --bg-dark: #000000; --card-bg: #1a1a1a; --inner-bg: #262626; }
        body, html { margin: 0; padding: 0; font-family: 'PingFang TC', 'Heiti TC', sans-serif; background: var(--bg-dark); color: #eee; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        
        /* --- 導覽列 --- */
        nav { display: flex; justify-content: center; gap: 12px; background: rgba(0,0,0,0.9); padding: 15px 0; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #222; backdrop-filter: blur(10px); }
        nav button { background: none; border: 1px solid #444; color: #777; padding: 6px 18px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; letter-spacing: 2px; transition: 0.3s; }
        nav button.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        .page { display: none; flex-direction: column; align-items: center; padding: 100px 20px 40px; min-height: 100vh; box-sizing: border-box; opacity: 0; transition: opacity 0.4s; }
        .page.active { display: flex; opacity: 1; }

        /* --- Recipe 卡片 --- */
        .luxury-outer { border: 5px solid var(--gold); padding: 10px; width: 100%; max-width: 360px; margin: 10px auto; border-radius: 40px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        .luxury-inner { background: var(--card-bg); border-radius: 35px; padding: 25px; text-align: left; min-height: 520px; display: flex; flex-direction: column; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .tag { padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: bold; color: #000; }
        .tag-base { background: #5d9cec; } .tag-str { background: #ed5565; } .tag-flav { background: #a0d468; } .tag-meth { background: #ffce54; } .tag-glass { background: #ac92ec; }
        
        .recipe-title-zh { color: var(--gold); font-size: 1.8rem; margin: 5px 0 0; font-weight: bold; letter-spacing: 2px; }
        .recipe-title-en { color: #666; font-size: 0.85rem; font-style: italic; margin-bottom: 20px; }
        
        .ing-box { background: var(--inner-bg); border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        .ing-list { list-style: none; padding: 0; margin: 0; color: #ccc; line-height: 1.8; font-size: 0.9rem; }
        .ing-list li::before { content: "• "; color: var(--gold); margin-right: 8px; }
        
        .tip-box { 
            padding: 15px; border-top: 1px solid rgba(212, 175, 55, 0.2); 
            background: rgba(255, 255, 255, 0.02); border-radius: 0 0 20px 20px;
            font-size: 0.85rem; color: #999; line-height: 1.6; position: relative;
        }
        .tip-box::before { content: "STORY"; display: block; font-size: 0.6rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; font-weight: bold; }

        /* --- Party 視覺優化 --- */
        .game-card { 
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d); 
            border: 2px solid var(--gold); padding: 40px 20px; width: 90%; max-width: 340px; 
            border-radius: 25px; text-align: center; margin: 30px 0; /* 增加上下間距，避免相黏 */
            font-size: 1.4rem; color: var(--gold); font-weight: bold;
            min-height: 180px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .mode-switch { display: flex; background: #111; border: 1px solid #333; border-radius: 50px; padding: 4px; margin-bottom: 20px; }
        .mode-switch button { border: none; padding: 8px 30px; border-radius: 50px; font-size: 0.85rem; background: none; color: #666; font-weight: bold; transition: 0.3s; }
        .mode-switch button.active { background: var(--gold); color: #000; box-shadow: 0 2px 10px rgba(212, 175, 55, 0.3); }

        .custom-area { width: 90%; max-width: 340px; display: none; flex-direction: column; margin-top: 10px; }
        .custom-area.show { display: flex; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .input-group input { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 12px; font-size: 0.9rem; outline: none; }
        .input-group input:focus { border-color: var(--gold); }
        .input-group button { background: var(--gold); border: none; padding: 0 18px; border-radius: 12px; font-weight: bold; font-size: 1.2rem; }

        .cmd-list { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 5px; max-height: 180px; overflow-y: auto; border: 1px solid #222; }
        .cmd-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #222; font-size: 0.85rem; color: #bbb; }
        .cmd-item:last-child { border: none; }
        .del-btn { color: #ed5565; background: none; border: none; font-size: 1.1rem; padding: 0 5px; }

        .generate-btn, .game-btn { background: var(--gold); color: #000; border: none; padding: 16px 60px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; letter-spacing: 3px; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }
        
        @keyframes shake-anim { 0%, 100% {transform: translateX(0)} 20% {transform: translateX(10px)} 40% {transform: translateX(-10px)} }
        .shaking { animation: shake-anim 0.3s infinite; }
    </style>
</head>
<body>
    <nav>
        <button onclick="showPage('home-page')" id="nav-home" class="active">HOME</button>
        <button onclick="showPage('recipe-page')" id="nav-recipe">RECIPE</button>
        <button onclick="showPage('game-page')" id="nav-party">PARTY</button>
    </nav>

    <section id="home-page" class="page active">
        <h1 style="font-size: 3.5rem; color: var(--gold); margin-top: 10vh; letter-spacing: 12px; text-shadow: 0 5px 15px rgba(212,175,55,0.2);">BAR 🍸</h1>
        <div style="border: 1px solid #333; padding: 40px 30px; border-radius: 25px; text-align: center; background: rgba(255,255,255,0.02); width: 80%; max-width: 300px; margin-top: 20px;">
            <p style="color: #666; font-size: 0.6rem; letter-spacing: 3px; margin: 0;">MANAGER'S CHOICE</p>
            <div id="ds-zh" style="font-size: 1.8rem; color: var(--gold); font-weight: bold; margin: 15px 0;">---</div>
            <p id="ds-en" style="color: #555; font-style: italic; font-size: 0.8rem;">Ready for tonight?</p>
        </div>
    </section>

    <section id="recipe-page" class="page">
        <div class="luxury-outer"><div id="recipe-display" class="luxury-inner"><div style="text-align:center;margin-top:200px;color:#444; font-style:italic;">Shake device to explore...</div></div></div>
        <button class="generate-btn" onclick="roll()">GENERATE</button>
    </section>

    <section id="game-page" class="page">
        <div class="mode-switch">
            <button id="m-def" class="active" onclick="switchMode('default')">內建</button>
            <button id="m-cus" onclick="switchMode('custom')">全自訂</button>
        </div>
        <div id="game-display" class="game-card">Shake or Draw</div>
        <button class="game-btn" onclick="rollGame()">DRAW</button>
        
        <div id="cus-area" class="custom-area">
            <div class="input-group">
                <input type="text" id="cus-input" placeholder="輸入新的大冒險...">
                <button onclick="addCmd()">+</button>
            </div>
            <div id="cmd-list" class="cmd-list"></div>
            <button onclick="clearAll()" style="color:var(--gold); background:none; border:none; font-size:0.75rem; margin-top:15px; opacity:0.6; width: 100%;">清空所有自訂指令</button>
        </div>
    </section>

    <script>
        const database = [
            // Gin
            {zh:"馬丁尼",en:"Martini",base:"琴酒",str:"強烈",flav:"辛辣",meth:"攪拌",glass:"馬丁尼杯",ing:["琴酒 60ml","辛口苦艾酒 10ml"],tip:"不僅007愛喝，就連英國前首相邱吉爾曾說：調馬丁尼時，只要對著法國方向鞠個躬（苦艾酒產地）就夠了。這是一杯屬於男人的剛毅，冷冽、乾淨且充滿力量。"},
            {zh:"尼格羅尼",en:"Negroni",base:"琴酒",str:"強烈",flav:"苦甜",meth:"攪拌",glass:"古典杯",ing:["琴酒 30ml","金巴利 30ml","紅苦艾酒 30ml"],tip:"起源於佛羅倫斯，尼格羅尼伯爵嫌美式咖啡太淡，要求加強琴酒。這抹深紅代表了義大利式的優雅，是苦澀與甘甜的終極平衡。"},
            {zh:"琴蕾",en:"Gimlet",base:"琴酒",str:"中等",flav:"酸甜",meth:"搖盪",glass:"馬丁尼杯",ing:["琴酒 45ml","萊姆汁 15ml"],tip:"《漫長的告別》中有一句名言：『真正的琴蕾，就是琴酒配玫瑰牌萊姆汁。』這杯酒起初是為了讓水手在船上對抗壞血病而生的救命靈藥。"},
            {zh:"白色佳人",en:"White Lady",base:"琴酒",str:"中等",flav:"酸甜",meth:"搖盪",glass:"馬丁尼杯",ing:["琴酒 40ml","橙酒 30ml","檸檬汁"],tip:"調酒界最優雅的月光。它純白、乾滑，橙酒與檸檬的酸甜掩蓋了烈酒的鋒芒，適合在深夜的爵士樂聲中慢慢啜飲。"},
            {zh:"臨別一語",en:"Last Word",base:"琴酒",str:"強烈",flav:"草本",meth:"搖盪",glass:"馬丁尼杯",ing:["琴酒","綠夏翠絲","黑櫻桃酒","萊姆汁"],tip:"這是一杯在禁酒令時期消失、後又在西雅圖被找回的傳奇。草本感極重，口感繁複且銳利，每一口都像是對夜晚發出的挑戰。"},
            {zh:"琴費斯",en:"Gin Fizz",base:"琴酒",str:"輕微",flav:"清爽",meth:"搖盪",glass:"高球杯",ing:["琴酒 45ml","蘇打水","檸檬汁"],tip:"氣泡感在舌尖炸裂的瞬間，就像夏日的一場及時雨。這杯酒考驗調酒師對溫度的掌握，是酒吧裡最經典的消暑救贖。"},
            // Whiskey
            {zh:"古典",en:"Old Fashioned",base:"威士忌",str:"強烈",flav:"苦甜",meth:"攪拌",glass:"古典杯",ing:["波本威士忌 45ml","方糖","苦精"],tip:"雞尾酒的始祖。隨著方糖緩慢融化，你會感受到這杯酒隨時間變化的多層面貌。記住，這杯酒是用來『品』的，不是用來喝乾的。"},
            {zh:"威士忌酸酒",en:"Whiskey Sour",base:"威士忌",str:"中等",flav:"酸甜",meth:"搖盪",glass:"古典杯",ing:["威士忌 45ml","檸檬汁","蛋白"],tip:"蛋白的加入讓整杯酒像穿上絲絨外衣。它在酸與甜之間尋找威士忌的木質調，口感滑順到讓你忘記它依然是高濃度的烈酒。"},
            {zh:"曼哈頓",en:"Manhattan",base:"威士忌",str:"強烈",flav:"濃郁",meth:"攪拌",glass:"馬丁尼杯",ing:["裸麥威士忌","紅苦艾酒","苦精"],tip:"雞尾酒之后。它深邃、濃郁，帶著紅色苦艾酒的草本氣息。象徵著19世紀紐約上流社會的繁華與迷人。"},
            {zh:"盤尼西林",en:"Penicillin",base:"威士忌",str:"中等",flav:"煙燻",meth:"搖盪",glass:"古典杯",ing:["威士忌","檸檬汁","蜂蜜薑汁糖漿"],tip:"這杯酒的味道就像它的名字：良藥。煙燻泥煤味與薑汁的辛辣在喉嚨撞擊，像是寒冬裡的一把火，專治靈魂的疲憊。"},
            {zh:"羅伯羅伊",en:"Rob Roy",base:"威士忌",str:"強烈",flav:"濃郁",meth:"攪拌",glass:"馬丁尼杯",ing:["蘇格蘭威士忌","紅苦艾酒"],tip:"蘇格蘭版的曼哈頓，獻給傳奇英雄羅伯羅伊。比起曼哈頓，它多了一份蘇格蘭威士忌特有的煙燻與大地氣息。"},
            {zh:"薄荷茱莉普",en:"Mint Julep",base:"威士忌",str:"中等",flav:"清爽",meth:"直調",glass:"碎冰杯",ing:["波本威士忌","薄荷葉","糖"],tip:"美國肯塔基賽馬會的官方飲品。大量的碎冰在銀杯上結起白霜，在那份極致冰涼中，薄荷與波本威士忌達到了一種野性的契合。"},
            // Rum
            {zh:"莫希托",en:"Mojito",base:"蘭姆酒",str:"輕微",flav:"清爽",meth:"直調",glass:"高球杯",ing:["蘭姆酒","薄荷","蘇打水","萊姆"],tip:"海明威在哈瓦那留下的經典。薄荷一定要拍碎而不切斷，讓精油緩緩滲入碳酸，每一口都是古巴溫暖的海風。"},
            {zh:"黛綺莉",en:"Daiquiri",base:"蘭姆酒",str:"中等",flav:"酸甜",meth:"搖盪",glass:"馬丁尼杯",ing:["白蘭姆酒 60ml","萊姆汁 22.5ml"],tip:"這是調酒師的試金石。如果比例失衡，這杯酒就會變得難以入喉。它簡單到殘酷，卻能體現蘭姆酒最原始的甜美。"},
            {zh:"月黑風高",en:"Dark 'N' Stormy",base:"蘭姆酒",str:"中等",flav:"辛辣",meth:"直調",glass:"高球杯",ing:["黑蘭姆酒","薑汁啤酒","萊姆"],tip:"層次分明：底部是辛辣的薑汁啤酒，上方覆蓋著深色的蘭姆酒。看起來就像百慕達海上即將來臨的暴風雲。"},
            {zh:"邁泰",en:"Mai Tai",base:"蘭姆酒",str:"強烈",flav:"果香",meth:"搖盪",glass:"Tiki杯",ing:["深淺蘭姆酒","橙酒","杏仁糖漿"],tip:"大溪地語意為『極致的美味』。它是熱帶文化的巔峰，果香濃郁到讓你忘記裡面藏著兩份烈酒，小心後勁。"},
            {zh:"自由古巴",en:"Cuba Libre",base:"蘭姆酒",str:"輕微",flav:"酸甜",meth:"直調",glass:"高球杯",ing:["蘭姆酒","可樂","萊姆"],tip:"誕生於美西戰爭結束時。這不僅是可樂加酒，萊姆的酸度賦予了蘭姆酒新的靈魂，慶祝著自由與獨立。"},
            {zh:"椰林飄香",en:"Piña Colada",base:"蘭姆酒",str:"輕微",flav:"甜美",meth:"搖盪",glass:"颶風杯",ing:["蘭姆酒","鳳梨汁","椰奶"],tip:"波多黎各的國酒。它是一份液態的假期，椰奶與鳳梨融合出的綿密口感，適合在陽光直射的午後，不想清醒地度過。"},
            // Tequila
            {zh:"瑪格麗特",en:"Margarita",base:"龍舌蘭",str:"中等",flav:"酸鹹",meth:"搖盪",glass:"瑪格麗特杯",ing:["龍舌蘭","橙酒","萊姆汁","鹽"],tip:"杯緣的鹽圈能完美引發龍舌蘭的甜味。傳說這是一杯紀念戀人的調酒，每一口都帶著淚水的鹹與回憶的酸甜。"},
            {zh:"龍舌蘭日出",en:"Sunrise",base:"龍舌蘭",str:"輕微",flav:"果香",meth:"直調",glass:"高球杯",ing:["龍舌蘭","柳橙汁","紅石榴糖漿"],tip:"1970年代因為滾石樂團而爆紅。紅石榴緩緩沉入杯底，形成美麗的漸層，象徵著墨西哥高原上初升的暖陽。"},
            {zh:"帕羅瑪",en:"Paloma",base:"龍舌蘭",str:"輕微",flav:"柚香",meth:"直調",glass:"高球杯",ing:["龍舌蘭","葡萄柚蘇打","鹽"],tip:"在墨西哥，這杯酒的人氣遠超瑪格麗特。葡萄柚的微苦與碳酸感，讓龍舌蘭的植物氣息顯得異常溫柔且平易近人。"},
            {zh:"鬥牛士",en:"Matador",base:"龍舌蘭",str:"輕微",flav:"清爽",meth:"搖盪",glass:"笛型杯",ing:["龍舌蘭","鳳梨汁","萊姆汁"],tip:"專門為受不了龍舌蘭辛辣味的人設計。鳳梨的果甜完全包覆了基酒，讓這頭憤怒的公牛瞬間安靜下來。"},
            {zh:"神之使者",en:"El Diablo",base:"龍舌蘭",str:"中等",flav:"薑香",meth:"直調",glass:"高球杯",ing:["龍舌蘭","黑醋栗","薑汁啤酒"],tip:"『惡魔』之名源自其魅惑的深紫色。黑醋栗的莓果香與薑汁的辛辣感結合，口感誘人，一不小心靈魂就會被它帶走。"},
            {zh:"墨西哥騾子",en:"Mexican Mule",base:"龍舌蘭",str:"輕微",flav:"薑汁",meth:"直調",glass:"銅杯",ing:["龍舌蘭","萊姆汁","薑汁啤酒"],tip:"當龍舌蘭遇到薑，會產生一種奇妙的乾爽感。用銅杯裝著，極速的冰鎮感直擊腦門，是狂歡派對的開場首選。"},
            // Vodka
            {zh:"莫斯科騾子",en:"Moscow Mule",base:"伏特加",str:"輕微",flav:"薑汁",meth:"直調",glass:"銅杯",ing:["伏特加","萊姆汁","薑汁啤酒"],tip:"當年這酒是為了促銷滯銷的銅杯與薑汁啤酒而生的。誰能想到，它卻成了酒吧裡永恆的經典，清涼解暑。"},
            {zh:"咖啡馬丁尼",en:"Espresso Martini",base:"伏特加",str:"中等",flav:"濃郁",meth:"搖盪",glass:"馬丁尼杯",ing:["伏特加","濃縮咖啡","咖啡酒"],tip:"一位名模曾在深夜要求調酒師：『給我來杯能吵醒我、然後弄醉我的酒。』這杯帶著咖啡油脂香氣的馬丁尼就此誕生。"},
            {zh:"長島冰茶",en:"Long Island",base:"伏特加",str:"強烈",flav:"酸甜",meth:"直調",glass:"高球杯",ing:["五大基酒","橙酒","可樂"],tip:"它沒有茶，卻有著紅茶的視覺。五種烈酒堆疊出的後勁極強，是所有派對初學者最致命的溫柔鄉。"},
            {zh:"柯夢波丹",en:"Cosmopolitan",base:"伏特加",str:"中等",flav:"果香",meth:"搖盪",glass:"馬丁尼杯",ing:["伏特加","橙酒","蔓越莓汁"],tip:"因為《慾望城市》而成為都會女性的標配。蔓越莓與橙皮油的結合，讓這杯酒充滿了現代大都市的精緻、活力與自信。"},
            {zh:"海風",en:"Sea Breeze",base:"伏特加",str:"輕微",flav:"果香",meth:"直調",glass:"高球杯",ing:["伏特加","蔓越莓汁","葡萄柚汁"],tip:"這酒的口感就像它的名字。微苦、微酸且涼爽，是一杯即便你不常喝酒，也能輕易在海邊愛上的作品。"},
            {zh:"血腥瑪麗",en:"Bloody Mary",base:"伏特加",str:"中等",flav:"鹹辣",meth:"滾動",glass:"高球杯",ing:["伏特加","番茄汁","香辣醬","黑胡椒"],tip:"號稱是全世界最複雜的調酒，甚至是『解酒良藥』。有人說是液態沙拉，適合在宿醉的早午餐時段細細品嚐。"},
            // Brandy
            {zh:"側車",en:"Sidecar",base:"白蘭地",str:"中等",flav:"酸甜",meth:"搖盪",glass:"馬丁尼杯",ing:["白蘭地 50ml","橙酒 20ml","檸檬汁 20ml"],tip:"這是白蘭地調酒中的『完美比例』。名字來源於一戰時期常用的側掛摩托車，象徵著古典白蘭地的優雅。"},
            {zh:"亞歷山大",en:"Alexander",base:"白蘭地",str:"中等",flav:"奶香",meth:"搖盪",glass:"馬丁尼杯",ing:["白蘭地","可可酒","鮮奶油"],tip:"1922年為瑪麗公主的婚禮而設計。它就像一杯帶酒精的可可奶昔，絲滑細緻，是專屬成人的深夜甜點。"},
            {zh:"薩澤拉克",en:"Sazerac",base:"白蘭地",str:"強烈",flav:"草本",meth:"攪拌",glass:"古典杯",ing:["白蘭地","艾碧斯","苦精"],tip:"誕生於紐奧良，被公認為世界第一杯雞尾酒。杯壁那抹淡淡的艾碧斯香氣，是這杯酒高貴、神祕且不可取代的靈魂。"},
            {zh:"馬蹄",en:"Horse's Neck",base:"白蘭地",str:"輕微",flav:"清爽",meth:"直調",glass:"高球杯",ing:["白蘭地","薑汁汽水"],tip:"亮點在於那條長到誇張、捲旋而下的檸檬皮，遠看就像馬脖子。口感乾脆利落，是白蘭地最平易近人的喝法。"},
            {zh:"香榭麗舍",en:"Champs-Élysées",base:"白蘭地",str:"強烈",flav:"草本",meth:"搖盪",glass:"馬丁尼杯",ing:["白蘭地","黃夏翠絲","檸檬汁"],tip:"法式的極致浪漫。草本酒之王『夏翠絲』與白蘭地的碰撞，口感高貴且層次分明，彷彿深夜漫步在巴黎街頭。"},
            {zh:"床第之間",en:"Between Sheets",base:"白蘭地",str:"強烈",flav:"酸甜",meth:"搖盪",glass:"馬丁尼杯",ing:["白蘭地","蘭姆酒","橙酒"],tip:"這是一杯屬於夜晚、極具侵略性且充滿危險魅力的調酒。"}
        ];

        let customCmds = JSON.parse(localStorage.getItem('party_custom_cmds')) || [];
        let mode = 'default';

        function showPage(pId) {
            document.querySelectorAll('.page').forEach(p=>{p.classList.remove('active'); p.style.display='none';});
            const t = document.getElementById(pId); t.style.display='flex'; setTimeout(()=>t.classList.add('active'),10);
            document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
            document.getElementById('nav-'+(pId==='game-page'?'party':pId.split('-')[0])).classList.add('active');
        }

        function roll() {
            const d = document.getElementById('recipe-display'); d.classList.add('shaking');
            setTimeout(()=>{
                d.classList.remove('shaking'); const r = database[Math.floor(Math.random()*database.length)];
                d.innerHTML = `
                    <div class="tag-container">
                        <span class="tag tag-base">${r.base}</span>
                        <span class="tag tag-str">${r.str}</span>
                        <span class="tag tag-flav">${r.flav}</span>
                        <span class="tag tag-meth">${r.meth}</span>
                        <span class="tag tag-glass">${r.glass}</span>
                    </div>
                    <h2 class="recipe-title-zh">${r.zh}</h2>
                    <div class="recipe-title-en">${r.en}</div>
                    <div class="ing-box">
                        <ul class="ing-list">${r.ing.map(i=>`<li>${i}</li>`).join('')}</ul>
                    </div>
                    <div class="tip-box">${r.tip}</div>
                `;
            },400);
        }

        function switchMode(m) {
            mode = m; document.getElementById('m-def').className = m==='default'?'active':'';
            document.getElementById('m-cus').className = m==='custom'?'active':'';
            document.getElementById('cus-area').style.display = m==='custom'?'flex':'none';
            if(m==='custom') render();
        }

        function addCmd() {
            const i = document.getElementById('cus-input'); if(i.value.trim()){ customCmds.push(i.value); i.value=''; save(); }
        }

        function delCmd(idx) { customCmds.splice(idx,1); save(); }
        function clearAll() { if(confirm("確定要全部清空嗎？")){customCmds=[]; save();} }
        function save() { localStorage.setItem('party_custom_cmds', JSON.stringify(customCmds)); render(); }
        function render() {
            document.getElementById('cmd-list').innerHTML = customCmds.map((c,i)=>`<div class="cmd-item"><span>${c}</span><button class="del-btn" onclick="delCmd(${i})">×</button></div>`).join('') || '<p style="text-align:center;color:#444;font-size:0.8rem;padding:20px;">清單還是空的喔！</p>';
        }

        function rollGame() {
            const d = document.getElementById('game-display'); 
            let p = mode==='default' ? ["指定一人喝 1 杯","左右兩邊乾杯","手機電量最低的人喝","全喝","跟對面的人喝交杯酒","全場最清醒的人喝","手機末三碼最大的人喝","輸的人做 5 個伏地挺身"] : customCmds;
            if(!p.length){ d.innerText="請先新增指令"; return; }
            d.innerText="DRAWING..."; setTimeout(()=>{d.innerText=p[Math.floor(Math.random()*p.length)];},300);
        }

        window.onload = () => {
            const s = database[Math.floor(Math.random()*database.length)];
            document.getElementById('ds-zh').innerText=s.zh; document.getElementById('ds-en').innerText=s.en;
        };

        let lastU=0, lx, ly, lz, THRESHOLD=800;
        window.addEventListener('devicemotion', e => {
            if(document.getElementById('recipe-page').style.display!=='flex') return;
            let acc = e.accelerationIncludingGravity; let now = Date.now();
            if((now-lastU)>100){
                let diff = now-lastU; lastU=now;
                let speed = Math.abs(acc.x+acc.y+acc.z-lx-ly-lz)/diff*10000;
                if(speed>THRESHOLD) roll();
                lx=acc.x; ly=acc.y; lz=acc.z;
            }
        });
    </script>
</body>
</html>
