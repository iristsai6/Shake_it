<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>走跳酒Bar</title>
<link rel="icon" href="https://fav.farm/🍸?v=5">
<link rel="apple-touch-icon" href="https://fav.farm/🍸?v=5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#e8c96a;--gold2:#d4af37;--bg:#060608;--card:#111115;--card2:#181820;--border:rgba(232,201,106,0.25);--text:#f0ead6;--danger:#ff6b6b;--blue:#7eb8f7;--green:#7dd9a8;}
*{box-sizing:border-box;}
body,html{margin:0;padding:0;font-family:'Noto Serif TC','PingFang TC',serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999;}

/* NAV */
nav{display:flex;justify-content:center;gap:5px;background:rgba(6,6,8,0.95);padding:11px 8px;position:fixed;top:0;width:100%;z-index:1000;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);}
nav button{background:none;border:1px solid #333;color:#666;padding:7px 13px;border-radius:3px;font-family:'Noto Serif TC',serif;font-size:0.72rem;letter-spacing:1.5px;transition:.25s;white-space:nowrap;cursor:pointer;}
nav button.active{border-color:var(--gold);color:var(--gold);background:rgba(232,201,106,0.07);}

.page{display:none;flex-direction:column;align-items:center;padding:74px 16px 60px;min-height:100vh;}
.page.active{display:flex;}

/* ===== HOME ===== */
#home-page{padding-top:64px;}
.home-hero{text-align:center;padding:18px 20px 10px;width:100%;}
.home-hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,11vw,4.5rem);color:var(--gold);margin:0;letter-spacing:8px;text-shadow:0 0 40px rgba(232,201,106,0.3);}
.home-hero .sub{color:#555;font-size:0.62rem;letter-spacing:5px;margin:6px 0 0;text-transform:uppercase;}

/* Recipe card */
.luxury-outer{border:3px solid var(--gold2);padding:6px;width:calc(100% - 32px);max-width:360px;border-radius:36px;box-shadow:0 0 30px rgba(212,175,55,0.1);}
.luxury-inner{background:var(--card);border-radius:32px;padding:22px;text-align:left;min-height:200px;display:flex;flex-direction:column;}
.tag-container{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.tag{padding:4px 10px;border-radius:6px;font-size:0.62rem;font-weight:700;color:#000;}
.tag-base{background:#5d9cec}.tag-str{background:#ed5565}.tag-flav{background:#a0d468}.tag-meth{background:#ffce54}.tag-glass{background:#ac92ec}
.recipe-title-zh{color:var(--gold);font-size:1.7rem;margin:4px 0 0;font-weight:700;font-family:'Playfair Display',serif;}
.recipe-title-en{color:#555;font-size:0.83rem;font-style:italic;margin-bottom:14px;}
.ing-box{background:#0a0a0e;border-radius:14px;padding:14px;margin-bottom:10px;}
.ing-list{list-style:none;padding:0;margin:0;color:#ccc;line-height:1.8;font-size:0.85rem;}
.ing-list li::before{content:"• ";color:var(--gold);margin-right:6px;}
.tip-box{padding:12px;border-top:1px solid rgba(232,201,106,0.15);font-size:0.8rem;color:#888;line-height:1.65;}
.tip-box::before{content:"STORY";display:block;font-size:0.58rem;color:var(--gold);letter-spacing:3px;margin-bottom:6px;font-weight:700;}
.generate-btn{background:var(--gold);color:#000;border:none;padding:14px 50px;border-radius:50px;font-weight:700;cursor:pointer;margin-top:14px;letter-spacing:3px;box-shadow:0 5px 20px rgba(232,201,106,0.2);font-family:'Noto Serif TC',serif;font-size:0.88rem;}
.shake-hint{font-size:0.6rem;color:#3a3a3a;letter-spacing:2px;margin-top:8px;}

/* PARTY on home */
.party-section{width:calc(100% - 32px);max-width:360px;margin-top:20px;}
.party-divider{font-size:0.6rem;letter-spacing:5px;color:#333;text-align:center;margin:0 0 14px;text-transform:uppercase;}
.mode-switch{display:flex;background:#0d0d0d;border:1px solid #222;border-radius:50px;padding:4px;margin-bottom:14px;}
.mode-switch button{border:none;padding:8px 0;flex:1;border-radius:50px;font-size:0.8rem;background:none;color:#444;font-weight:700;transition:.3s;font-family:'Noto Serif TC',serif;cursor:pointer;}
.mode-switch button.active{background:var(--gold);color:#000;}
.game-card{background:linear-gradient(145deg,#111115,#0a0a0e);border:2px solid var(--gold);padding:28px 20px;width:100%;border-radius:20px;text-align:center;font-size:1.2rem;color:var(--gold);font-weight:700;min-height:130px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,0.6);font-family:'Playfair Display',serif;margin-bottom:12px;}
.draw-btn{background:transparent;border:1px solid var(--gold2);color:var(--gold);padding:12px 40px;border-radius:50px;font-weight:700;cursor:pointer;letter-spacing:3px;font-family:'Noto Serif TC',serif;font-size:0.85rem;transition:.25s;width:100%;}
.draw-btn:hover{background:rgba(232,201,106,0.08);}
.custom-area{display:none;flex-direction:column;margin-top:12px;}
.custom-area.show{display:flex;}
.input-group{display:flex;gap:8px;margin-bottom:12px;}
.input-group input{flex:1;background:#0d0d0d;border:1px solid #333;color:var(--text);padding:11px 14px;border-radius:12px;font-size:0.86rem;outline:none;font-family:'Noto Serif TC',serif;}
.input-group input:focus{border-color:var(--gold);}
.input-group button{background:var(--gold);border:none;padding:0 16px;border-radius:12px;font-weight:700;font-size:1.2rem;color:#000;cursor:pointer;}
.cmd-list{background:rgba(255,255,255,0.02);border-radius:12px;padding:4px;max-height:160px;overflow-y:auto;border:1px solid #1a1a1a;}
.cmd-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #181818;font-size:0.83rem;color:#999;}
.cmd-item:last-child{border:none;}
.del-btn{color:#ed5565;background:none;border:none;font-size:1.1rem;padding:0 5px;cursor:pointer;}

/* ===== GUIDE ===== */
.section-title{font-size:0.62rem;letter-spacing:5px;color:#555;margin:20px 0 12px;text-transform:uppercase;text-align:center;width:100%;}
.base-selector{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;max-width:440px;margin-bottom:14px;}
.base-btn{background:var(--card);border:1px solid #333;border-radius:50px;padding:9px 15px;font-size:0.76rem;color:#888;cursor:pointer;transition:.25s;font-family:'Noto Serif TC',serif;}
.base-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(232,201,106,0.08);}
.guide-list{width:100%;max-width:440px;display:flex;flex-direction:column;gap:10px;}
.guide-card{background:var(--card);border:1px solid #222;border-radius:18px;overflow:hidden;transition:.3s;}
.guide-card:hover{border-color:#3a3a3a;}
.guide-card-header{display:flex;align-items:center;justify-content:space-between;padding:15px 17px;cursor:pointer;}
.gc-left{display:flex;flex-direction:column;gap:3px;}
.gc-name{font-size:1.05rem;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif;}
.gc-en{font-size:0.67rem;color:#555;font-style:italic;}
.gc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.gc-tag{font-size:0.6rem;padding:3px 8px;border-radius:4px;font-weight:700;}
.gc-tag.abv{background:#e84393;color:#fff;}
.gc-tag.base-tag{background:#5d9cec;color:#fff;}
.gc-tag.vibe{background:#7dd9a8;color:#000;}
.gc-arrow{font-size:0.95rem;color:#444;transition:transform .3s;flex-shrink:0;margin-left:8px;}
.guide-card.open .gc-arrow{transform:rotate(180deg);}
.guide-card-body{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.guide-card.open .guide-card-body{max-height:700px;}
.guide-card-inner{padding:0 17px 17px;border-top:1px solid #181818;}
.gc-recipe-title{font-size:0.63rem;letter-spacing:3px;color:#555;margin:14px 0 8px;text-transform:uppercase;}
.gc-ing-box{background:#0a0a0e;border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.gc-ing-list{list-style:none;padding:0;margin:0;color:#ccc;line-height:1.8;font-size:0.82rem;}
.gc-ing-list li::before{content:"• ";color:var(--gold);}
.gc-desc{font-size:0.8rem;color:#888;line-height:1.7;margin-bottom:8px;}
.gc-who{font-size:0.72rem;color:var(--blue);}
.gc-who::before{content:"✦ 適合 ";color:#555;}
.ask-bar{width:100%;max-width:440px;display:flex;gap:8px;margin-top:4px;padding-bottom:8px;}
.ask-bar input{flex:1;background:#111;border:1px solid #333;color:var(--text);padding:12px 16px;border-radius:50px;font-size:0.88rem;outline:none;font-family:'Noto Serif TC',serif;}
.ask-bar input:focus{border-color:var(--gold);}
.ask-bar button{background:var(--gold);border:none;padding:10px 18px;border-radius:50px;font-weight:700;font-size:0.78rem;color:#000;cursor:pointer;white-space:nowrap;font-family:'Noto Serif TC',serif;}
.claude-response{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;font-size:0.85rem;line-height:1.7;color:var(--text);width:100%;max-width:440px;}
.typing-dot{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;margin:0 2px;animation:blink 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* ===== TRACKER ===== */
.tracker-counter{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:28px;text-align:center;width:calc(100% - 32px);max-width:340px;margin-bottom:16px;}
.counter-display{font-size:5.5rem;font-family:'Playfair Display',serif;color:var(--gold);line-height:1;margin:8px 0;text-shadow:0 0 30px rgba(232,201,106,0.3);}
.counter-display.danger{color:var(--danger);text-shadow:0 0 30px rgba(255,107,107,0.4);}
.counter-label{font-size:0.65rem;color:#666;letter-spacing:3px;margin:0;}
.counter-status{font-size:0.84rem;color:#888;margin:6px 0 0;}
.counter-btns{display:flex;gap:16px;justify-content:center;margin-top:20px;}
.cnt-btn{width:60px;height:60px;border-radius:50%;border:2px solid var(--gold);background:transparent;color:var(--gold);font-size:1.8rem;cursor:pointer;transition:.25s;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.cnt-btn:active{background:rgba(232,201,106,0.15);}
.cnt-btn.reset{border-color:#333;color:#555;font-size:1rem;}
.water-alert{background:rgba(126,184,247,0.08);border:1px solid rgba(126,184,247,0.35);border-radius:16px;padding:15px 20px;text-align:center;width:calc(100% - 32px);max-width:340px;margin-bottom:16px;display:none;animation:pulseA 2s infinite;}
.water-alert.show{display:block;}
@keyframes pulseA{0%,100%{opacity:1}50%{opacity:.7}}
.water-alert p{margin:0;font-size:0.92rem;color:var(--blue);font-weight:700;}
.rules-card{background:var(--card);border:1px solid #222;border-radius:20px;padding:20px;width:calc(100% - 32px);max-width:340px;}
.rules-title{font-size:0.65rem;letter-spacing:4px;color:#555;margin:0 0 14px;}
.rule-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid #181818;cursor:pointer;}
.rule-item:last-child{border:none;}
.rule-cb{width:22px;height:22px;border:2px solid #444;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;margin-top:1px;}
.rule-item.checked .rule-cb{background:var(--green);border-color:var(--green);}
.rule-item.checked .rule-cb::after{content:'✓';color:#000;font-size:0.8rem;font-weight:900;}
.rule-text{font-size:0.85rem;line-height:1.5;color:#bbb;}
.rule-item.checked .rule-text{color:#444;text-decoration:line-through;}

/* ===== BAR ===== */
.bar-type-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;max-width:440px;margin-bottom:14px;}
.bar-type-btn{background:var(--card);border:1px solid #333;border-radius:50px;padding:8px 15px;font-size:0.75rem;color:#888;cursor:pointer;transition:.25s;font-family:'Noto Serif TC',serif;}
.bar-type-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(232,201,106,0.07);}
.bar-info-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;width:calc(100% - 32px);max-width:440px;margin-bottom:14px;}
.bar-info-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.bar-info-icon{font-size:2rem;}
.bar-info-name{font-size:1.2rem;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif;}
.bar-info-sub{font-size:0.7rem;color:#555;}
.bar-info-desc{font-size:0.83rem;color:#aaa;line-height:1.75;margin-bottom:12px;}
.bar-vibes{display:flex;flex-wrap:wrap;gap:6px;}
.bar-vibe-tag{background:#14141a;border:1px solid #2a2a35;border-radius:6px;padding:4px 10px;font-size:0.65rem;color:#888;}
.kh-bars{display:flex;flex-direction:column;gap:12px;width:calc(100% - 32px);max-width:440px;margin-bottom:20px;}
.kh-bar-card{background:var(--card);border:1px solid #222;border-radius:18px;padding:18px;}
.kh-bar-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.kh-bar-name{font-size:1.02rem;font-weight:700;color:var(--text);}
.kh-map-btn{background:none;border:1px solid #2a2a35;border-radius:20px;padding:5px 12px;font-size:0.65rem;color:#888;cursor:pointer;white-space:nowrap;font-family:'Noto Serif TC',serif;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:.2s;}
.kh-map-btn:hover{border-color:var(--gold);color:var(--gold);}
.kh-bar-addr{font-size:0.68rem;color:#444;margin-bottom:8px;}
.kh-bar-desc{font-size:0.79rem;color:#999;line-height:1.65;margin-bottom:10px;}
.kh-bar-drinks{display:flex;flex-wrap:wrap;gap:5px;}
.kh-drink-tag{background:rgba(232,201,106,0.07);border:1px solid rgba(232,201,106,0.18);border-radius:6px;padding:3px 9px;font-size:0.63rem;color:var(--gold);}

/* Maps search banner */
.maps-search-banner{background:rgba(126,184,247,0.05);border:1px solid rgba(126,184,247,0.2);border-radius:14px;padding:14px 16px;width:calc(100% - 32px);max-width:440px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.maps-search-banner .msb-icon{font-size:1.4rem;flex-shrink:0;}
.maps-search-banner .msb-text{font-size:0.75rem;color:#888;line-height:1.6;}
.maps-search-link{display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:#000;font-weight:700;font-size:0.75rem;padding:9px 18px;border-radius:50px;text-decoration:none;margin-top:8px;font-family:'Noto Serif TC',serif;}

@keyframes shake-anim{0%,100%{transform:translateX(0)}20%{transform:translateX(10px)}40%{transform:translateX(-10px)}}
.shaking{animation:shake-anim .3s infinite;}
</style>
</head>
<body>

<nav>
  <button onclick="showPage('home-page')" id="nav-home" class="active">HOME</button>
  <button onclick="showPage('guide-page')" id="nav-guide">GUIDE</button>
  <button onclick="showPage('tracker-page')" id="nav-tracker">TRACKER</button>
  <button onclick="showPage('bar-page')" id="nav-bar">BAR</button>
</nav>

<!-- ========== HOME ========== -->
<section id="home-page" class="page active">
  <div class="home-hero">
    <h1>BAR 🍸</h1>
    <p class="sub">走跳酒Bar</p>
  </div>

  <!-- Recipe Generator -->
  <div style="width:calc(100% - 32px);max-width:360px;margin-top:14px;">
    <div class="luxury-outer">
      <div id="home-recipe-display" class="luxury-inner">
        <div style="text-align:center;margin:auto;color:#2a2a2a;font-style:italic;font-size:0.85rem;padding:40px 0 30px;">
          搖晃手機或點下方按鈕<br>探索今晚的配方
        </div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <button class="generate-btn" onclick="homeRoll()">GENERATE ✦</button>
      <p id="shake-status" style="font-size:0.6rem;color:#3a3a3a;letter-spacing:2px;margin:8px 0 0;">✦ 搖晃手機也可觸發</p>
    </div>

  <!-- Party Game -->
  <div class="party-section">
    <p class="party-divider">— 大冒險 —</p>
    <div class="mode-switch">
      <button id="m-def" class="active" onclick="switchMode('default')">內建指令</button>
      <button id="m-cus" onclick="switchMode('custom')">全自訂</button>
    </div>
    <div id="game-display" class="game-card">Shake or Draw 🎲</div>
    <button class="draw-btn" onclick="rollGame()">DRAW</button>
    <div id="cus-area" class="custom-area">
      <div class="input-group" style="margin-top:12px;">
        <input type="text" id="cus-input" placeholder="輸入新的大冒險...">
        <button onclick="addCmd()">+</button>
      </div>
      <div id="cmd-list" class="cmd-list"></div>
      <button onclick="clearAll()" style="color:var(--gold);background:none;border:none;font-size:0.73rem;margin-top:12px;opacity:0.5;width:100%;cursor:pointer;">清空所有自訂指令</button>
    </div>
  </div>
</section>

<!-- ========== GUIDE ========== -->
<section id="guide-page" class="page" style="padding-bottom:30px;">
  <p class="section-title" style="margin-top:4px;">選擇基酒</p>
  <div class="base-selector">
    <button class="base-btn active" onclick="selectBase(this,'gin')">🌿 琴酒</button>
    <button class="base-btn" onclick="selectBase(this,'whisky')">🥃 威士忌</button>
    <button class="base-btn" onclick="selectBase(this,'rum')">🍬 蘭姆酒</button>
    <button class="base-btn" onclick="selectBase(this,'tequila')">🌵 龍舌蘭</button>
    <button class="base-btn" onclick="selectBase(this,'vodka')">❄️ 伏特加</button>
    <button class="base-btn" onclick="selectBase(this,'brandy')">🍷 白蘭地</button>
  </div>
  <div class="guide-list" id="guide-list"></div>
  <p class="section-title">不知道喝什麼？問 Claude</p>
  <div id="guide-claude-resp" style="display:none;width:100%;max-width:440px;">
    <div class="claude-response" id="guide-resp-text"></div>
  </div>
  <div class="ask-bar">
    <input type="text" id="guide-input" placeholder="例如：我怕苦、喜歡果香…">
    <button onclick="askClaudeGuide()">問 Claude</button>
  </div>
</section>

<!-- ========== TRACKER ========== -->
<section id="tracker-page" class="page">
  <p class="section-title" style="margin-top:4px;">今晚飲酒計數</p>
  <div class="tracker-counter">
    <p class="counter-label">TODAY'S COUNT</p>
    <div class="counter-display" id="counter-num">0</div>
    <p class="counter-status" id="counter-status">今晚的第一杯，慢慢來 🍸</p>
    <div class="counter-btns">
      <button class="cnt-btn reset" onclick="resetDrinks()">↺</button>
      <button class="cnt-btn" onclick="addDrink()" style="font-size:2rem;width:72px;height:72px;">+</button>
      <button class="cnt-btn" onclick="minusDrink()" style="font-size:1.8rem;">−</button>
    </div>
  </div>
  <div class="water-alert" id="water-alert">
    <p>💧 超過 3 杯了！先喝一杯水再繼續吧</p>
  </div>
  <div class="rules-card">
    <p class="rules-title">酒客生存守則 · 今晚勾選了嗎？</p>
    <div id="rules-list"></div>
  </div>
</section>

<!-- ========== BAR ========== -->
<section id="bar-page" class="page">
  <p class="section-title" style="margin-top:4px;">選擇類型</p>
  <div class="bar-type-grid">
    <button class="bar-type-btn active" onclick="selectBarType(this,'cocktail')">🍸 Cocktail Bar</button>
    <button class="bar-type-btn" onclick="selectBarType(this,'whisky')">🥃 Whisky Bar</button>
    <button class="bar-type-btn" onclick="selectBarType(this,'wine')">🍷 Wine Bar</button>
    <button class="bar-type-btn" onclick="selectBarType(this,'craft_beer')">🍺 Craft Beer</button>
    <button class="bar-type-btn" onclick="selectBarType(this,'speakeasy')">🚪 Speakeasy</button>
  </div>
  <div class="bar-info-card" id="bar-info-card"></div>

  <!-- Maps search banner -->
  <div class="maps-search-banner" id="maps-banner">
    <span class="msb-icon">📍</span>
    <div>
      <div class="msb-text">點擊下方按鈕在 Google Maps 搜尋附近酒吧<br><span style="color:#555;font-size:0.68rem;">※ 地圖嵌入需要付費 API，改用搜尋連結確保 100% 可用</span></div>

const RULES = ["喝酒不開車，開車不喝酒","🔞未滿十八請勿飲酒","先把前任封鎖🥲","理性飲酒，感性品酒","保護錢包小心肝❤️","先吃點東西保護胃","設定今晚的上限!沒有極限是騙人的!","手機充好電，但別打給前任","計畫好怎麼回家，不要酒後開車！","節奏放慢點，享受不同風味帶來的體驗","感覺有點頭暈就躲個酒水遁一下","喝前確認酒的 ABV，心裡有數"];

// ======================== STATE ========================
let drinkCount = 0;
let checkedRules = [];
let customCmds = [];
let gameMode = 'default';

// ======================== NAV ========================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
  const t = document.getElementById(id);
  t.style.display = 'flex';
  setTimeout(() => t.classList.add('active'), 10);
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const m = {'home-page':'home','guide-page':'guide','tracker-page':'tracker','bar-page':'bar'};
  const el = document.getElementById('nav-' + m[id]);
  if (el) el.classList.add('active');
}

// ======================== RECIPE RENDER ========================
function renderRecipe(el, r) {
  el.innerHTML = `
    <div class="tag-container">
      <span class="tag tag-base">${r.bl}</span>
      <span class="tag tag-str">${r.str}</span>
      <span class="tag tag-flav">${r.flav}</span>
      <span class="tag tag-meth">${r.meth}</span>
      <span class="tag tag-glass">${r.glass}</span>
    </div>
    <h2 class="recipe-title-zh">${r.zh}</h2>
    <div class="recipe-title-en">${r.en}</div>
    <div class="ing-box"><ul class="ing-list">${r.ing.map(i=>`<li>${i}</li>`).join('')}</ul></div>
    <div class="tip-box">${r.tip}</div>`;
}

function homeRoll() {
  const d = document.getElementById('home-recipe-display');
  d.classList.add('shaking');
  setTimeout(() => {
    d.classList.remove('shaking');
    renderRecipe(d, DB[Math.floor(Math.random() * DB.length)]);
  }, 350);
}

// ======================== PARTY ========================
function switchMode(m) {
  gameMode = m;
  document.getElementById('m-def').className = m === 'default' ? 'active' : '';
  document.getElementById('m-cus').className = m === 'custom' ? 'active' : '';
  document.getElementById('cus-area').style.display = m === 'custom' ? 'flex' : 'none';
  if (m === 'custom') renderCmds();
}
function addCmd() {
  const i = document.getElementById('cus-input');
  if (i.value.trim()) { customCmds.push(i.value.trim()); i.value = ''; renderCmds(); }
}
function delCmd(idx) { customCmds.splice(idx, 1); renderCmds(); }
function clearAll() { if (confirm('確定要全部清空嗎？')) { customCmds = []; renderCmds(); } }
function renderCmds() {
  document.getElementById('cmd-list').innerHTML = customCmds.map((c, i) =>
    `<div class="cmd-item"><span>${c}</span><button class="del-btn" onclick="delCmd(${i})">×</button></div>`
  ).join('') || '<p style="text-align:center;color:#2a2a2a;font-size:0.8rem;padding:16px">清單還是空的喔！</p>';
}
function rollGame() {
  const d = document.getElementById('game-display');
  const p = gameMode === 'default'
    ? ["指定一人喝 1 杯", "左右兩邊乾杯", "手機電量最低的人喝", "全喝", "跟對面的人喝交杯酒", "全場最清醒的人喝", "手機末三碼最大的人喝", "輸的人做 5 個伏地挺身", "說說最近一次醉酒的故事", "喝一杯說出你今天最丟臉的事"]
    : customCmds;
  if (!p.length) { d.innerText = "請先新增指令"; return; }
  d.innerText = "DRAWING...";
  setTimeout(() => { d.innerText = p[Math.floor(Math.random() * p.length)]; }, 300);
}

// ======================== GUIDE ========================
function selectBase(btn, base) {
  document.querySelectorAll('.base-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGuideList(base);
  document.getElementById('guide-claude-resp').style.display = 'none';
}
function renderGuideList(base) {
  const items = DB.filter(d => d.base === base);
  document.getElementById('guide-list').innerHTML = items.map((r, idx) => {
    const uid = `gc_${base}_${idx}`;
    return `<div class="guide-card" id="${uid}">
      <div class="guide-card-header" onclick="toggleGuideCard('${uid}')">
        <div class="gc-left">
          <div class="gc-name">${r.zh} <span style="font-size:0.68rem;font-family:serif;font-style:italic;color:#555;font-weight:400;">${r.en}</span></div>
          <div class="gc-tags">
            <span class="gc-tag abv">${ABV_LABEL[r.str]}</span>
            <span class="gc-tag base-tag">${r.bl}</span>
            <span class="gc-tag vibe">${r.flav}</span>
          </div>
        </div>
        <div class="gc-arrow">▾</div>
      </div>
      <div class="guide-card-body">
        <div class="guide-card-inner">
          <p class="gc-recipe-title">酒譜</p>
          <div class="gc-ing-box"><ul class="gc-ing-list">${r.ing.map(i => `<li>${i}</li>`).join('')}</ul></div>
          <div class="gc-desc">${r.tip}</div>
          <div class="gc-who">${r.who}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}
function toggleGuideCard(id) {
  document.getElementById(id).classList.toggle('open');
}
async function askClaudeGuide() {
  const input = document.getElementById('guide-input');
  const q = input.value.trim();
  if (!q) return;
  const wrapper = document.getElementById('guide-claude-resp');
  const resp = document.getElementById('guide-resp-text');
  wrapper.style.display = 'block';
  resp.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  input.value = '';
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: "你是走跳酒Bar的調酒師助手，語氣親切如朋友。根據用戶描述，從酒單中推薦1-2款並說明原因，用繁體中文，60-90字內。",
        messages: [{ role: "user", content: q }]
      })
    });
    const data = await res.json();
    resp.innerText = data.content?.map(c => c.text || '').join('') || '抱歉，無法取得建議。';
  } catch (e) {
    resp.innerText = '連線失敗，請稍後再試。';
  }
}

// ======================== TRACKER ========================
function updateTrackerUI() {
  const num = document.getElementById('counter-num');
  const status = document.getElementById('counter-status');
  const water = document.getElementById('water-alert');
  num.innerText = drinkCount;
  if (drinkCount === 0) {
    num.className = 'counter-display';
    status.innerText = '今晚的第一杯，慢慢來 🍸';
    water.classList.remove('show');
  } else if (drinkCount <= 2) {
    num.className = 'counter-display';
    status.innerText = '狀態良好，繼續享受 ✨';
    water.classList.remove('show');
  } else if (drinkCount <= 4) {
    num.className = 'counter-display danger';
    status.innerText = '已超過 3 杯，先補水一下 💧';
    water.classList.add('show');
  } else {
    num.className = 'counter-display danger';
    status.innerText = '放慢節奏，注意安全 🙏';
    water.classList.add('show');
  }
}
function addDrink() { drinkCount++; updateTrackerUI(); }
function minusDrink() { if (drinkCount > 0) { drinkCount--; updateTrackerUI(); } }
function resetDrinks() { drinkCount = 0; updateTrackerUI(); }
function renderRules() {
  document.getElementById('rules-list').innerHTML = RULES.map((r, i) => `
    <div class="rule-item${checkedRules.includes(i) ? ' checked' : ''}" onclick="toggleRule(${i})">
      <div class="rule-cb"></div>
      <div class="rule-text">${r}</div>
    </div>`).join('');
}
function toggleRule(i) {
  if (checkedRules.includes(i)) checkedRules = checkedRules.filter(x => x !== i);
  else checkedRules.push(i);
  renderRules();
}

// ======================== BAR ========================

      <div class="kh-bar-top">

    </div>`).join('');

// ======================== SHAKE ========================
let lastShake = 0, sx = 0, sy = 0, sz = 0;
let shakeEnabled = false;

function enableShake() {
  if (shakeEnabled) return;
  shakeEnabled = true;
  window.addEventListener('devicemotion', e => {
    const a = e.accelerationIncludingGravity;
    if (!a) return;
    const now = Date.now();
    if ((now - lastShake) > 100) {
      const diff = now - lastShake; lastShake = now;
      const speed = Math.abs((a.x||0)+(a.y||0)+(a.z||0)-sx-sy-sz) / diff * 10000;
      if (speed > 800) {
        const home = document.getElementById('home-page');
        if (home.style.display === 'flex' || home.classList.contains('active')) homeRoll();
      }
      sx = a.x||0; sy = a.y||0; sz = a.z||0;
    }
  });
}

window.addEventListener('load', () => {
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    // iOS 13+：必須由使用者點擊按鈕才能呼叫 requestPermission
    const st = document.getElementById('shake-status');
    if (st) {
      st.innerHTML = '<button onclick="iosRequestShake()" style="background:none;border:1px dashed #555;color:#888;padding:6px 18px;border-radius:50px;font-size:0.65rem;letter-spacing:2px;cursor:pointer;font-family:\'Noto Serif TC\',serif;">📳 點我啟用搖晃</button>';
    }
  } else {
    // Android / 桌機：直接啟用
    enableShake();
  }
});

function iosRequestShake() {
  DeviceMotionEvent.requestPermission().then(state => {
    const st = document.getElementById('shake-status');
    if (state === 'granted') {
      enableShake();
      if (st) st.innerHTML = '<span style="color:var(--gold);font-size:0.65rem;letter-spacing:2px;">✦ 搖晃已啟用</span>';
    } else {
      if (st) st.innerHTML = '<span style="color:#ff6b6b;font-size:0.65rem;">⚠ 請至設定 > Safari 允許動態感應器</span>';
    }
  }).catch(() => enableShake());
}

// ======================== KEYBOARD ========================
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.activeElement.id === 'guide-input') askClaudeGuide();
  if (document.activeElement.id === 'cus-input') addCmd();
});

window.onload = () => {
  renderGuideList('gin');
  renderBarInfo('cocktail');
  renderKhBars('cocktail');
  // set default maps link
  document.getElementById('maps-link').href = `https://www.google.com/maps/search/${encodeURIComponent(BAR_INFO.cocktail.mapQ)}`;
  updateTrackerUI();
  renderRules();
};
</script>
