<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Gemini: 派對與調酒</title>
    <style>
        /* --- 基礎設定 --- */
        :root {
            --gold: #d4af37; /* 經典金 */
            --dark-gold: #996515;
            --bg-home: #0f0f0f;
            --text-home: #f39c12;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            transition: background 0.5s ease;
            min-height: 100vh;
        }

        /* --- 導覽列 --- */
        nav {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.8);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }
        nav button {
            background: none; border: 1px solid var(--gold);
            color: var(--gold); padding: 8px 20px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        nav button.active { background: var(--gold); color: black; }

        /* --- 分頁切換邏輯 --- */
        .page { display: none; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 90vh; box-sizing: border-box; }
        .page.active { display: flex; }

        /* --- 樣式 A: 首頁 (黑底金字) --- */
        #home-page { background: var(--bg-home); color: var(--text-home); text-align: center; }
        .home-title { font-size: 3rem; margin-top: 20vh; letter-spacing: 5px; text-shadow: 0 0 10px var(--gold); }
        .home-subtitle { color: #666; font-size: 1rem; }

        /* --- 樣式 B: 酒譜分頁 (黑金奢華) --- */
        #recipe-page { 
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            color: #eee;
        }
        .luxury-card {
            background: linear-gradient(145deg, #222, #111);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 30px;
            width: 90%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
            text-align: center;
        }
        .recipe-btn { 
            background: var(--gold); color: black; border: none; 
            padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer;
            margin-top: 20px; box-shadow: 0 4px 15px var(--dark-gold);
        }

        /* --- 樣式 C: 酒令分頁 (簡單藍白紅) --- */
        #game-page { background: #f4f4f4; color: #333; }
        .game-title { color: #e63946; font-size: 2.5rem; text-transform: uppercase; border-bottom: 5px solid #1d3557; }
        .game-card {
            background: white; border-left: 10px solid #e63946; border-right: 10px solid #457b9d;
            padding: 40px 20px; width: 90%; max-width: 400px;
            border-radius: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center; margin: 20px 0;
            font-size: 1.5rem; font-weight: bold;
        }
        .game-btn { 
            background: #1d3557; color: white; border: none; 
            padding: 15px 40px; border-radius: 5px; font-size: 1.2rem; cursor: pointer;
        }

        /* 動畫 */
        @keyframes shake { 0%, 100% {transform: rotate(0)} 25% {transform: rotate(5deg)} 75% {transform: rotate(-5deg)} }
        .shaking { animation: shake 0.5s infinite; }
    </style>
</head>
<body>

    <nav>
        <button id="nav-home" class="active" onclick="showPage('home-page')">首頁</button>
        <button id="nav-recipe" onclick="showPage('recipe-page')">抽調酒</button>
        <button id="nav-game" onclick="showPage('game-page')">玩酒令</button>
    </nav>

    <section id="home-page" class="page active">
        <h1 class="home-title">BAR GEMINI</h1>
        <p class="home-subtitle">奢華、驚喜、微醺</p>
        <p style="margin-top: 50px; border: 1px solid #333; padding: 10px;">請點擊上方選單開始你的夜晚</p>
    </section>

    <section id="recipe-page" class="page">
        <h2 style="color:var(--gold)">SELECT YOUR SPIRIT</h2>
        <div id="recipe-display" class="luxury-card">
            <p style="color: #666;">搖晃手機或點擊按鈕<br>決定今晚的靈魂配方</p>
        </div>
        <button class="recipe-btn" onclick="rollRecipe()">SHAKE IT!</button>
    </section>

    <section id="game-page" class="page">
        <h1 class="game-title">DRINK OR DARE</h1>
        <div id="game-display" class="game-card">
            準備好互相傷害了嗎？
        </div>
        <button class="game-btn" onclick="rollGame()">DRAW A COMMAND</button>
    </section>

    <script>
        // --- 頁面切換邏輯 ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active');
        }

        // --- 調酒資料庫 ---
        const cocktails = [
        // --- 琴酒 Gin (6杯) ---
        { zh: "馬丁尼", en: "Martini", base: "琴酒", str: "強烈", flav: "辛辣", ing: ["琴酒 60ml", "辛口苦艾酒 10ml", "橄欖或檸檬皮"] },
        { zh: "內格羅尼", en: "Negroni", base: "琴酒", str: "強烈", flav: "苦甜", ing: ["琴酒 30ml", "金巴利 30ml", "紅苦艾酒 30ml"] },
        { zh: "琴蕾", en: "Gimlet", base: "琴酒", str: "中等", flav: "酸甜", ing: ["琴酒 45ml", "新鮮檸檬汁 15ml", "糖漿 15ml"] },
        { zh: "白色佳人", en: "White Lady", base: "琴酒", str: "中等", flav: "酸甜", ing: ["琴酒 40ml", "橙酒 30ml", "檸檬汁 20ml"] },
        { zh: "最後一句話", en: "Last Word", base: "琴酒", str: "強烈", flav: "草本", ing: ["琴酒 22.5ml", "夏翠絲綠酒 22.5ml", "黑櫻桃酒 22.5ml", "萊姆汁 22.5ml"] },
        { zh: "琴費斯", en: "Gin Fizz", base: "琴酒", str: "輕微", flav: "清爽", ing: ["琴酒 45ml", "檸檬汁 30ml", "糖漿 10ml", "蘇打水 滿杯"] },

        // --- 威士忌 Whiskey (6杯) ---
        { zh: "古典雞尾酒", en: "Old Fashioned", base: "威士忌", str: "強烈", flav: "甜中帶苦", ing: ["波本威士忌 45ml", "方糖 1塊", "安格仕苦精 2滴"] },
        { zh: "威士忌酸酒", en: "Whiskey Sour", base: "威士忌", str: "中等", flav: "酸甜", ing: ["威士忌 45ml", "檸檬汁 30ml", "糖漿 15ml", "蛋白 (可選)"] },
        { zh: "曼哈頓", en: "Manhattan", base: "威士忌", str: "強烈", flav: "濃郁", ing: ["裸麥威士忌 50ml", "紅苦艾酒 20ml", "安格仕苦精 2滴"] },
        { zh: "盤尼西林", en: "Penicillin", base: "威士忌", str: "中等", flav: "煙燻辛辣", ing: ["調和威士忌 60ml", "檸檬汁 22.5ml", "蜂蜜薑汁糖漿 22.5ml", "艾雷島威士忌 噴霧"] },
        { zh: "羅伯羅伊", en: "Rob Roy", base: "威士忌", str: "強烈", flav: "濃郁苦甜", ing: ["蘇格蘭威士忌 45ml", "紅苦艾酒 22ml", "安格仕苦精 2滴"] },
        { zh: "薄荷茱莉普", en: "Mint Julep", base: "威士忌", str: "中等", flav: "清爽草本", ing: ["波本威士忌 60ml", "新鮮薄荷葉 8-10片", "方糖 1塊"] },

        // --- 蘭姆酒 Rum (6杯) ---
        { zh: "莫希托", en: "Mojito", base: "蘭姆酒", str: "輕微", flav: "清爽", ing: ["白蘭姆酒 45ml", "新鮮薄荷葉", "檸檬汁", "糖漿", "蘇打水"] },
        { zh: "黛綺莉", en: "Daiquiri", base: "蘭姆酒", str: "中等", flav: "酸甜", ing: ["白蘭姆酒 60ml", "萊姆汁 22.5ml", "糖漿 22.5ml"] },
        { zh: "月黑風高", en: "Dark 'N' Stormy", base: "蘭姆酒", str: "中等", flav: "辛辣清爽", ing: ["黑蘭姆酒 60ml", "薑汁啤酒 滿杯", "萊姆角"] },
        { zh: "麥邁", en: "Mai Tai", base: "蘭姆酒", str: "強烈", flav: "果香堅果", ing: ["黑蘭姆酒 30ml", "白蘭姆酒 30ml", "橙酒 15ml", "杏仁糖漿 15ml"] },
        { zh: "自由古巴", en: "Cuba Libre", base: "蘭姆酒", str: "輕微", flav: "清爽果香", ing: ["蘭姆酒 50ml", "可樂 滿杯", "萊姆角"] },
        { zh: "皮納卡拉達", en: "Piña Colada", base: "蘭姆酒", str: "輕微", flav: "熱帶甜感", ing: ["蘭姆酒 50ml", "鳳梨汁 50ml", "椰奶 50ml"] },

        // --- 龍舌蘭 Tequila (6杯) ---
        { zh: "瑪格麗特", en: "Margarita", base: "龍舌蘭", str: "中等", flav: "酸鹹", ing: ["龍舌蘭 50ml", "橙酒 20ml", "檸檬汁 15ml"] },
        { zh: "特基拉日出", en: "Tequila Sunrise", base: "龍舌蘭", str: "輕微", flav: "果香", ing: ["龍舌蘭 45ml", "柳橙汁 90ml", "紅石榴糖漿 15ml"] },
        { zh: "帕羅瑪", en: "Paloma", base: "龍舌蘭", str: "輕微", flav: "葡萄柚酸甜", ing: ["龍舌蘭 50ml", "葡萄柚蘇打 滿杯", "萊姆汁", "鹽圈"] },
        { zh: "龍舌蘭馬丁尼", en: "Tequini", base: "龍舌蘭", str: "強烈", flav: "辛辣", ing: ["龍舌蘭 60ml", "辛口苦艾酒 15ml", "苦精 1滴"] },
        { zh: "鬥牛士", en: "Matador", base: "龍舌蘭", str: "輕微", flav: "清爽酸甜", ing: ["龍舌蘭 30ml", "鳳梨汁 60ml", "萊姆汁 15ml"] },
        { zh: "神之使者", en: "El Diablo", base: "龍舌蘭", str: "中等", flav: "薑汁果香", ing: ["龍舌蘭 45ml", "黑醋栗利口酒 15ml", "萊姆汁", "薑汁啤酒"] },

        // --- 伏特加 Vodka (6杯) ---
        { zh: "莫斯科騾子", en: "Moscow Mule", base: "伏特加", str: "輕微", flav: "薑汁辛辣", ing: ["伏特加 45ml", "萊姆汁 15ml", "薑汁啤酒 滿杯"] },
        { zh: "濃縮咖啡馬丁尼", en: "Espresso Martini", base: "伏特加", str: "中等", flav: "咖啡濃郁", ing: ["伏特加 50ml", "濃縮咖啡 30ml", "咖啡利口酒 15ml"] },
        { zh: "長島冰茶", en: "Long Island Iced Tea", base: "伏特加", str: "強烈", flav: "酸甜", ing: ["五大基酒各 15ml", "橙酒 15ml", "檸檬汁", "可樂"] },
        { zh: "柯夢波丹", en: "Cosmopolitan", base: "伏特加", str: "中等", flav: "果香酸甜", ing: ["伏特加 40ml", "橙酒 15ml", "蔓越莓汁 30ml", "檸檬汁"] },
        { zh: "海風", en: "Sea Breeze", base: "伏特加", str: "輕微", flav: "清爽果香", ing: ["伏特加 40ml", "蔓越莓汁 120ml", "葡萄柚汁 30ml"] },
        { zh: "血腥瑪麗", en: "Bloody Mary", base: "伏特加", str: "中等", flav: "鹹辣鮮味", ing: ["伏特加 45ml", "番茄汁 90ml", "檸檬汁", "辣醬/黑胡椒"] },

        // --- 白蘭地 Brandy (6杯) ---
        { zh: "側車", en: "Sidecar", base: "白蘭地", str: "中等", flav: "酸甜", ing: ["白蘭地 50ml", "橙酒 20ml", "檸檬汁 20ml"] },
        { zh: "亞歷山大", en: "Alexander", base: "白蘭地", str: "中等", flav: "奶香甜感", ing: ["白蘭地 30ml", "深色可可酒 30ml", "鮮奶油 30ml"] },
        { zh: "薩澤拉克", en: "Sazerac", base: "白蘭地", str: "強烈", flav: "草本藥草", ing: ["白蘭地 60ml", "方糖", "裴喬氏苦精", "艾碧斯 潤杯"] },
        { zh: "馬蹄", en: "Horse's Neck", base: "白蘭地", str: "輕微", flav: "清爽薑汁", ing: ["白蘭地 40ml", "薑汁汽水 滿杯", "長條螺旋檸檬皮"] },
        { zh: "香榭麗舍", en: "Champs-Élysées", base: "白蘭地", str: "強烈", flav: "草本", ing: ["白蘭地 60ml", "夏翠絲黃酒 15ml", "檸檬汁", "苦精"] },
        { zh: "維修站", en: "Between the Sheets", base: "白蘭地", str: "強烈", flav: "紮實酸甜", ing: ["白蘭地 30ml", "白蘭姆酒 30ml", "橙酒 30ml", "檸檬汁"] }
];

        function rollRecipe() {
            const display = document.getElementById('recipe-display');
            display.classList.add('shaking');
            setTimeout(() => {
                display.classList.remove('shaking');
                const res = cocktails[Math.floor(Math.random() * cocktails.length)];
                display.innerHTML = `
                    <div style="font-size:0.8rem; color:var(--gold); border:1px solid var(--gold); display:inline-block; padding:2px 10px; margin-bottom:10px;">${res.base}</div>
                    <div style="font-size:2rem; font-weight:bold; color:white;">${res.zh}</div>
                    <div style="color:#888; margin-bottom:20px;">${res.en}</div>
                    <div style="text-align:left; background:rgba(255,255,255,0.05); padding:15px; border-radius:10px;">
                        <ul style="margin:0; padding-left:20px; font-size:0.9rem;">
                            ${res.ing.map(i => `<li>${i}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }, 600);
        }

        // --- 酒令資料庫 ---
        const commands = ["現場選一人喝 1 杯", "左邊的人喝", "手機電量最低的人喝", "全體乾杯", "說一個祕密，不然喝 3 杯"];

        function rollGame() {
            const display = document.getElementById('game-display');
            display.innerHTML = "LOCKED & LOADED...";
            setTimeout(() => {
                const cmd = commands[Math.floor(Math.random() * commands.length)];
                display.innerHTML = cmd;
            }, 300);
        }
    </script>
</body>
</html>
